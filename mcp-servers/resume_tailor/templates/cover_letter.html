<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  @page { size: A4; margin: 1in; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 11pt; line-height: 1.6; color: #1a1a1a; }
  .header { margin-bottom: 24pt; }
  .name { font-size: 16pt; font-weight: 700; }
  .contact-info { font-size: 9.5pt; color: #555; margin-top: 4pt; }
  .date { margin-top: 20pt; margin-bottom: 20pt; font-size: 10.5pt; color: #333; }
  .recipient { margin-bottom: 20pt; font-size: 10.5pt; }
  .body-text { margin-bottom: 14pt; text-align: justify; }
  .closing { margin-top: 24pt; }
  .signature { margin-top: 8pt; font-weight: 600; }
</style>
</head>
<body>

<div class="header">
  <div class="name">{{ name }}</div>
  <div class="contact-info">
    {{ contact.email }}
    {% if contact.phone %} | {{ contact.phone }}{% endif %}
    {% if contact.location %} | {{ contact.location }}{% endif %}
  </div>
</div>

<div class="date">{{ date }}</div>

<div class="recipient">
  <div>Hiring Manager</div>
  <div>{{ company }}</div>
</div>

<div class="body-text">
  Dear Hiring Manager,
</div>

{% for paragraph in paragraphs %}
<div class="body-text">{{ paragraph }}</div>
{% endfor %}

<div class="closing">
  Sincerely,
  <div class="signature">{{ name }}</div>
</div>

</body>
</html>
